name : pos

services:

  frontend:
    build: ./frontend/vue_project
    container_name: pos_frontend
    ports:
      - "5173:5173"
    depends_on:
      - api

  api:
    build: ./backend
    container_name: pos_api
    ports:
      - "8000:8000"
    depends_on:
      - db

  db:
    image: mysql:8
    container_name: pos_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: pos
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  mysql_data: